openapi: "3.0.3"
info:
  title: Fixture API
  version: "1.0.0"
  description: Artificial OpenAPI 3.0 spec used by parser unit tests.

tags:
  - name: vpcs
    description: Virtual Private Cloud operations
  - name: subnets
    description: Subnet management
  - name: instances
    description: Compute instance management

paths:
  # ── Regular paths ────────────────────────────────────────────────────────────

  /v1/vpcs:
    get:
      operationId: listVpcs
      summary: List VPCs
      description: Returns a paginated list of VPCs in a project.
      tags:
        - vpcs
      parameters:
        - name: projectId
          in: query
          required: true
          description: ID of the project to list VPCs for.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: Offset into the result set.
          schema:
            type: integer
        - name: includeDeleted
          in: query
          required: false
          description: Whether to include soft-deleted VPCs.
          schema:
            type: boolean
        - $ref: "#/components/parameters/RequestIdHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpcList"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

    post:
      operationId: createVpc
      summary: Create a VPC
      description: Creates a new VPC in the given project.
      tags:
        - vpcs
      parameters:
        - $ref: "#/components/parameters/RequestIdHeader"
      requestBody:
        required: true
        description: VPC creation parameters.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVpcRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vpc"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict — a VPC with this name already exists.

  /v1/vpcs/{vpcId}:
    get:
      operationId: getVpc
      summary: Get a VPC
      description: Fetches a single VPC by its ID.
      tags:
        - vpcs
      parameters:
        - name: vpcId
          in: path
          required: true
          description: The unique identifier of the VPC.
          schema:
            type: string
        - $ref: "#/components/parameters/RequestIdHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vpc"
        "404":
          description: Not Found

    put:
      operationId: updateVpc
      summary: Update a VPC
      tags:
        - vpcs
      parameters:
        - name: vpcId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/RequestIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVpcRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vpc"
        "404":
          description: Not Found

    delete:
      operationId: deleteVpc
      summary: Delete a VPC
      description: Permanently deletes a VPC and all its subnets.
      tags:
        - vpcs
      deprecated: true
      parameters:
        - name: vpcId
          in: path
          required: true
          schema:
            type: string
        - name: force
          in: query
          required: false
          description: If true, forcefully removes dependent resources.
          schema:
            type: boolean
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
        "409":
          description: Conflict — VPC has active instances.

  /v1/subnets:
    post:
      operationId: createSubnet
      summary: Create a subnet
      tags:
        - subnets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubnetRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subnet"

  /v1/subnets/{subnetId}:
    patch:
      operationId: patchSubnet
      summary: Partially update a subnet
      tags:
        - subnets
      parameters:
        - name: subnetId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        description: Fields to update; omitted fields are left unchanged.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchSubnetRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subnet"

  /v1/instances:
    get:
      operationId: listInstances
      summary: List instances
      description: List compute instances with optional filters.
      tags:
        - instances
      parameters:
        - name: vpcId
          in: query
          required: false
          description: Filter by VPC ID.
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Filter by instance status.
          schema:
            type: string
        - name: pageSize
          in: query
          required: false
          description: Number of results per page.
          schema:
            type: integer
        - name: X-Trace-Id
          in: header
          required: false
          description: Distributed tracing identifier.
          schema:
            type: string
        - name: session
          in: cookie
          required: false
          deprecated: true
          description: Legacy session cookie; deprecated in favour of bearer tokens.
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstanceList"

    post:
      operationId: createInstance
      summary: Create an instance
      description: Provisions a new compute instance.
      tags:
        - instances
      requestBody:
        required: true
        description: Instance creation parameters.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInstanceRequest"
      responses:
        "202":
          description: Accepted — instance is being provisioned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/instances/{instanceId}:
    get:
      operationId: getInstance
      summary: Get an instance
      tags:
        - instances
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
        "404":
          description: Not Found

    delete:
      operationId: deleteInstance
      summary: Delete an instance
      tags:
        - instances
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found

  /v1/instances/{instanceId}/resize:
    post:
      operationId: resizeInstance
      summary: Resize an instance
      description: Changes the CPU and memory allocation of a stopped instance.
      tags:
        - instances
      deprecated: true
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResizeInstanceRequest"
      responses:
        "202":
          description: Accepted
        "409":
          description: Conflict — instance must be stopped before resizing.

  /v1/stats:
    get:
      operationId: getStats
      summary: Get API usage statistics
      description: Returns aggregate usage counters. No authentication required.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"

components:
  parameters:
    RequestIdHeader:
      name: X-Request-Id
      in: header
      required: false
      description: Client-supplied idempotency / tracing token.
      schema:
        type: string

  schemas:
    # ── Simple objects ─────────────────────────────────────────────────────────

    Vpc:
      type: object
      required:
        - id
        - name
        - projectId
        - createdAt
      properties:
        id:
          type: string
          description: Unique identifier for the VPC.
        name:
          type: string
          description: Human-readable name.
        projectId:
          type: string
          description: ID of the owning project.
        description:
          type: string
          description: Optional free-text description.
        cidr:
          type: string
          description: CIDR block, e.g. 10.0.0.0/16.
        createdAt:
          type: string
          description: ISO-8601 creation timestamp.
        deletedAt:
          type: string
          description: ISO-8601 deletion timestamp, if soft-deleted.

    VpcList:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          description: The page of VPC objects.
          items:
            $ref: "#/components/schemas/Vpc"
        total:
          type: integer
          description: Total number of VPCs matching the query.
        nextOffset:
          type: integer
          description: Offset for the next page, if any.

    CreateVpcRequest:
      type: object
      required:
        - name
        - projectId
      properties:
        name:
          type: string
          description: Human-readable name for the VPC.
        projectId:
          type: string
          description: ID of the project this VPC belongs to.
        description:
          type: string
          description: Optional description.
        cidr:
          type: string
          description: CIDR block for the VPC, e.g. 10.0.0.0/16.

    UpdateVpcRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: New name for the VPC.
        description:
          type: string
          description: Updated description.

    Subnet:
      type: object
      required:
        - id
        - name
        - vpcId
        - cidr
      properties:
        id:
          type: string
          description: Unique identifier for the subnet.
        name:
          type: string
          description: Subnet name.
        vpcId:
          type: string
          description: ID of the parent VPC.
        cidr:
          type: string
          description: CIDR block for the subnet.
        zone:
          type: string
          description: Availability zone.
        routeCount:
          type: integer
          description: Number of routes associated with this subnet.

    CreateSubnetRequest:
      type: object
      required:
        - name
        - vpcId
        - cidr
      properties:
        name:
          type: string
          description: Name of the subnet.
        vpcId:
          type: string
          description: ID of the parent VPC.
        cidr:
          type: string
          description: CIDR block for the subnet.
        zone:
          type: string
          description: Availability zone.

    PatchSubnetRequest:
      type: object
      properties:
        name:
          type: string
          description: New name for the subnet.
        description:
          type: string
          description: Updated description.

    # ── Nested object ──────────────────────────────────────────────────────────

    Instance:
      type: object
      required:
        - id
        - name
        - status
        - spec
      properties:
        id:
          type: string
          description: Unique identifier for the instance.
        name:
          type: string
          description: Human-readable name.
        status:
          type: string
          description: Current lifecycle status (running, stopped, error, …).
        spec:
          type: object
          description: Hardware specification of the instance.
          properties:
            vcpus:
              type: integer
              description: Number of virtual CPUs.
            memoryGb:
              type: integer
              description: Memory in gigabytes.
            diskGb:
              type: integer
              description: Root disk size in gigabytes.
        tags:
          type: array
          description: Arbitrary string labels attached to the instance.
          items:
            type: string
        publicIp:
          type: string
          description: Public IPv4 address, if assigned.

    InstanceList:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          description: The page of Instance objects.
          items:
            $ref: "#/components/schemas/Instance"
        total:
          type: integer
          description: Total number of instances matching the query.

    CreateInstanceRequest:
      type: object
      required:
        - name
        - vpcId
        - subnetId
        - imageId
        - flavorId
      properties:
        name:
          type: string
          description: Name for the new instance.
        vpcId:
          type: string
          description: VPC to place the instance in.
        subnetId:
          type: string
          description: Subnet to attach the primary NIC to.
        imageId:
          type: string
          description: OS image identifier.
        flavorId:
          type: string
          description: Hardware flavor (CPU/RAM/disk profile).
        userData:
          type: string
          description: Cloud-init user data script, base64-encoded.
        count:
          type: integer
          description: Number of identical instances to create (default 1).
        enablePublicIp:
          type: boolean
          description: Whether to allocate a public IPv4 address.
        metadata:
          type: object
          description: Arbitrary key-value metadata to attach to the instance.
          properties:
            env:
              type: string
              description: Deployment environment label.
            owner:
              type: string
              description: Owner identifier.

    ResizeInstanceRequest:
      type: object
      required:
        - flavorId
      properties:
        flavorId:
          type: string
          description: New hardware flavor to resize to.

    # ── allOf composition ──────────────────────────────────────────────────────

    StatsResponse:
      allOf:
        - $ref: "#/components/schemas/BaseStats"
        - type: object
          properties:
            apiCallsToday:
              type: integer
              description: Number of API calls made today.

    BaseStats:
      type: object
      required:
        - totalRequests
        - errorRate
      properties:
        totalRequests:
          type: integer
          description: Total number of API requests since account creation.
        errorRate:
          type: number
          description: Fraction of requests that resulted in a 4xx or 5xx response.
        uptimeSeconds:
          type: integer
          description: Seconds since the API was last restarted.

    # ── Error envelope ─────────────────────────────────────────────────────────

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human-readable error message.
        details:
          type: array
          description: Additional error details, if available.
          items:
            type: object
            properties:
              field:
                type: string
                description: The field that caused the error.
              reason:
                type: string
                description: Explanation of why this field is invalid.
